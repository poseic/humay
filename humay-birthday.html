<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Günün Mübarək, Humay! ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --pink:#ff6bb5; --yellow:#ffe135; --cyan:#00d4ff;
  --purple:#c84bff; --green:#3dffb0;
  --bg:#00000f;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;overflow-x:hidden;}
body{
  background:var(--bg);
  color:#fff;
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:none;
}

/* ── CUSTOM CURSOR ── */
#cursor{
  position:fixed;width:12px;height:12px;
  background:rgba(255,255,255,.9);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px rgba(255,255,255,.6);
  transition:transform .08s;
}

/* ── MOUSE TRAIL ── */
.trail{
  position:fixed;pointer-events:none;z-index:9998;
  border-radius:50%;transform:translate(-50%,-50%);
  animation:trailFade .5s ease forwards;
}
@keyframes trailFade{
  0%{opacity:.7;}100%{opacity:0;transform:translate(-50%,-50%) scale(0);}
}

/* ── SPARKLE ── */
@keyframes sparkleFade{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0) translateY(-18px);}
}

/* ── COSMIC BACKGROUND ── */
#bgCanvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ── NEBULA ORBS (subtle, dark) ── */
.orb{
  position:fixed;border-radius:50%;
  filter:blur(120px);opacity:.07;
  pointer-events:none;z-index:0;
  animation:orbDrift var(--d,20s) ease-in-out infinite alternate;
}
.orb1{width:700px;height:700px;background:#1a3a6e;top:-200px;left:-200px;--d:22s;}
.orb2{width:600px;height:600px;background:#0d1f4a;bottom:-200px;right:-200px;--d:28s;}
.orb3{width:400px;height:400px;background:#0a1530;top:30%;left:30%;--d:18s;}
@keyframes orbDrift{
  from{transform:translate(0,0);}
  to{transform:translate(20px,15px);}
}

/* ── FIREWORKS CANVAS ── */
#fwCanvas{position:fixed;inset:0;z-index:6;pointer-events:none;}

/* ── FLOATING EMOJIS ── */
.floater{
  position:fixed;pointer-events:none;z-index:3;
  animation:floatUp var(--d,9s) ease-in var(--dl,0s) infinite;
  opacity:0;font-size:var(--fs,20px);left:var(--l,50%);
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) rotate(0deg);}
  10%{opacity:.6;}
  90%{opacity:.2;}
  100%{opacity:0;transform:translateY(-105vh) rotate(360deg);}
}

/* ── METEOR ── */
@keyframes meteorFly{
  from{left:-10%;opacity:1;}
  to{left:110%;opacity:0;}
}

/* ── KART ── */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.042);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  border-radius:40px;
  padding:52px 44px 48px;
  text-align:center;
  width:92%;max-width:500px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.07) inset,
    0 40px 80px rgba(0,0,0,.8),
    0 0 120px rgba(100,150,255,.04);
  animation:cardIn 1s cubic-bezier(.34,1.56,.64,1) both;
  transform-style:preserve-3d;
  transition:transform .12s ease;
  /* animated gradient border */
  outline:1.5px solid transparent;
  background-clip:padding-box;
}
/* thin glowing border */
.card::after{
  content:'';
  position:absolute;inset:-1.5px;
  border-radius:41px;
  background:linear-gradient(var(--angle,0deg),
    rgba(255,107,181,.5),rgba(0,212,255,.3),
    rgba(200,75,255,.4),rgba(255,107,181,.5));
  z-index:-1;
  animation:borderSpin 6s linear infinite;
  opacity:.6;
}
@property --angle{syntax:'<angle>';inherits:false;initial-value:0deg;}
@keyframes borderSpin{to{--angle:360deg;}}
@keyframes cardIn{
  from{opacity:0;transform:scale(.78) translateY(28px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.card::before{
  content:'';position:absolute;
  top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  border-radius:50%;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;justify-content:space-between;gap:10px;
  margin-bottom:22px;
}
.info-pill{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:50px;padding:6px 16px;
  font-size:13px;font-weight:700;
  color:rgba(255,255,255,.65);
  flex:1;text-align:center;
}
.info-pill span{color:var(--cyan);}

/* ── TORT ── */
.cake-wrap{
  position:relative;display:inline-block;
  margin-bottom:20px;cursor:pointer;
}
.cake-emoji{
  font-size:82px;display:inline-block;
  animation:floatCake 3.8s ease-in-out infinite;
  filter:drop-shadow(0 0 28px rgba(255,225,53,.35));
  transition:transform .15s;
}
.cake-wrap:hover .cake-emoji{transform:scale(1.12) rotate(-5deg);}
.cake-glow{
  position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);
  width:70px;height:12px;
  background:radial-gradient(ellipse,rgba(255,225,53,.4),transparent 70%);
  border-radius:50%;
  animation:glowPulse 3.8s ease-in-out infinite;
}
.cake-hint{
  position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(255,255,255,.2);white-space:nowrap;
  opacity:0;transition:opacity .3s;
}
.cake-wrap:hover .cake-hint{opacity:1;}
@keyframes floatCake{
  0%,100%{transform:translateY(0) rotate(-2deg);}
  50%{transform:translateY(-16px) rotate(2deg);}
}
@keyframes glowPulse{
  0%,100%{opacity:.4;transform:translateX(-50%) scaleX(1);}
  50%{opacity:.9;transform:translateX(-50%) scaleX(1.2);}
}

/* ── AD ── */
h1{
  font-family:'Pacifico',cursive;
  font-size:clamp(54px,13vw,80px);
  margin-bottom:6px;
  background:linear-gradient(100deg,var(--pink),var(--yellow),var(--cyan),var(--purple),var(--pink));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  background-size:300% auto;
  animation:shine 4s linear infinite, neonGlow 5s ease-in-out infinite;
}
@keyframes shine{
  0%{background-position:0% center;}100%{background-position:300% center;}
}
@keyframes neonGlow{
  0%,100%{filter:drop-shadow(0 0 14px rgba(255,107,181,.35)) drop-shadow(0 0 35px rgba(255,107,181,.15));}
  50%{filter:drop-shadow(0 0 24px rgba(255,107,181,.65)) drop-shadow(0 0 55px rgba(200,75,255,.35));}
}

/* ── SUBTITLE ── */
.subtitle{
  font-size:18px;font-weight:800;
  color:rgba(255,255,255,.55);
  margin-bottom:24px;letter-spacing:.5px;
  animation:fadeUp .8s .35s ease both;
}

/* ── TYPEWRITER ── */
.message-box{
  background:rgba(255,255,255,.04);
  padding:20px 24px;border-radius:20px;
  font-size:16px;font-weight:600;line-height:1.8;
  margin-bottom:24px;
  border:1px solid rgba(255,255,255,.07);
  text-align:left;position:relative;
  animation:fadeUp .8s .5s ease both;
  min-height:78px;
}
.message-box::before{
  content:'';position:absolute;
  left:0;top:16px;bottom:16px;width:3px;
  background:linear-gradient(180deg,var(--pink),var(--purple));
  border-radius:0 3px 3px 0;
}
.cursor-blink{
  display:inline-block;width:2px;height:1em;
  background:var(--pink);margin-left:2px;vertical-align:middle;
  animation:blink .7s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── COMPLIMENT ── */
.compliment-wrap{
  margin-bottom:26px;animation:fadeUp .8s .65s ease both;
}
.compliment-text{
  font-size:14.5px;font-weight:700;
  color:rgba(255,220,100,.85);min-height:22px;
  transition:opacity .25s;
}
.btn-compliment{
  margin-top:8px;
  background:rgba(255,220,100,.07);
  border:1px solid rgba(255,220,100,.2);
  color:rgba(255,220,100,.8);
  padding:7px 20px;border-radius:50px;
  font-size:13px;font-weight:800;cursor:pointer;
  transition:all .2s;
}
.btn-compliment:hover{background:rgba(255,220,100,.14);}

/* ── DÜYMƏLƏR ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.btn-main{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;border:none;
  padding:16px 34px;
  font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;
  border-radius:50px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 8px 28px rgba(200,75,255,.3);
  position:relative;overflow:hidden;
  animation:fadeUp .8s .8s ease both;
}
.btn-main::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 55%);
  border-radius:inherit;
}
.btn-main:hover{transform:scale(1.06) translateY(-3px);box-shadow:0 14px 40px rgba(200,75,255,.5);}
.btn-main:active{transform:scale(.97);}
.btn-main:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}

.btn-secondary{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.75);
  padding:14px 24px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  border-radius:50px;cursor:pointer;transition:all .2s;
  animation:fadeUp .8s .9s ease both;
}
.btn-secondary:hover{background:rgba(255,255,255,.1);}
.btn-secondary.active{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.4);color:var(--cyan);}

.shooter-hint{
  font-size:11px;color:rgba(255,255,255,.22);
  margin-top:6px;animation:fadeUp .8s 1s ease both;
  transition:color .3s;
}

/* ── PARTY BANNER ── */
.party-banner{
  display:none;position:fixed;top:24px;left:50%;
  transform:translateX(-50%);z-index:100;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  padding:12px 32px;border-radius:50px;
  font-size:17px;font-weight:900;letter-spacing:1px;
  box-shadow:0 8px 28px rgba(200,75,255,.4);
  animation:bannerPulse 1s ease-in-out infinite;
}
@keyframes bannerPulse{
  0%,100%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.04);}
}

/* ── EASTER EGG ── */
.egg-modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.egg-modal.show{display:flex;}
.egg-inner{
  background:rgba(8,8,24,.97);
  border:1px solid rgba(255,255,255,.1);
  border-radius:32px;padding:44px 40px;
  text-align:center;max-width:360px;width:90%;
  animation:cardIn .5s ease;
}
.egg-inner h2{font-family:'Pacifico',cursive;font-size:30px;margin-bottom:14px;color:var(--yellow);}
.egg-inner p{font-size:15.5px;line-height:1.75;color:rgba(255,255,255,.75);margin-bottom:24px;}
.egg-close{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  border:none;color:#fff;padding:12px 32px;
  border-radius:50px;font-size:15px;font-weight:900;cursor:pointer;
}

/* ── BALLOONS ── */
.balloons{
  position:fixed;bottom:-130px;width:100%;
  display:flex;justify-content:space-around;
  pointer-events:none;z-index:5;
}
.balloon{
  animation:riseUp var(--d,6s) ease-in var(--dl,0s) forwards;
  opacity:0;
}
@keyframes riseUp{
  0%{transform:translateY(0) rotate(0deg);opacity:0;}
  8%{opacity:1;}
  100%{transform:translateY(-130vh) rotate(20deg);opacity:0;}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<canvas id="bgCanvas"></canvas>
<canvas id="fwCanvas"></canvas>

<!-- EASTER EGG -->
<div class="egg-modal" id="eggModal">
  <div class="egg-inner">
    <h2>🥚 Gizli Mesaj!</h2>
    <p>Humay, sən otağa girəndə hava dəyişir. Bu sirri yalnız tortun bilir. 🎂✨</p>
    <button class="egg-close" onclick="closeEgg()">💖 Teşəkkür!</button>
  </div>
</div>

<!-- PARTY BANNER -->
<div class="party-banner" id="partyBanner">🎉 PARTY MODE AKTİV! 🎉</div>

<div class="card" id="mainCard">
  <div class="topbar">
    <div class="info-pill">🕐 <span id="clockDisplay">--:--:--</span></div>
    <div class="info-pill">🎂 <span id="countdown">...</span></div>
  </div>

  <div class="cake-wrap" id="cakeWrap">
    <div class="cake-emoji" id="cakeEmoji">🎂</div>
    <div class="cake-glow"></div>
    <div class="cake-hint">3x klikləsən... 👀</div>
  </div>

  <h1>Humay</h1>
  <p class="subtitle">✨ Ad Günün Mübarək! ✨</p>

  <div class="message-box">
    <span id="typedText"></span><span class="cursor-blink"></span>
  </div>

  <div class="compliment-wrap">
    <div class="compliment-text" id="complimentText">💬 Düyməyə bas...</div>
    <button class="btn-compliment" onclick="newCompliment()">✨ Yeni Kompliment</button>
  </div>

  <div class="btn-row">
    <button class="btn-main" id="celebrateBtn" onclick="celebrate()">🎆 Sürprizi Aç!</button>
  </div>
  <div class="btn-row">
    <button class="btn-secondary" id="shooterBtn" onclick="toggleShooter()">🎊 Konfeti Shooter</button>
  </div>
  <div class="shooter-hint" id="shooterHint">Aktiv olduqda hər yerə klikləyib konfeti at!</div>
</div>

<div class="balloons" id="balloons"></div>

<script>
/* ══════ CURSOR + TRAIL ══════ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  spawnTrail(e.clientX, e.clientY);
  spawnSparkle(e.clientX, e.clientY);
});
document.addEventListener('click', e => {
  if (shooterMode) shootConfetti(e.clientX, e.clientY);
});

let trailT = 0;
function spawnTrail(x, y) {
  if (Date.now() - trailT < 45) return; trailT = Date.now();
  const t = document.createElement('div');
  t.className = 'trail';
  const sz = 4 + Math.random() * 6;
  t.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;
    background:rgba(255,255,255,${0.1+Math.random()*.2});filter:blur(1px);`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 500);
}

let sparkleT = 0;
function spawnSparkle(x, y) {
  if (Date.now() - sparkleT < 90) return; sparkleT = Date.now();
  const sp = document.createElement('div');
  const icons = ['✦','✧','⋆','·','✨'];
  sp.textContent = icons[Math.floor(Math.random()*icons.length)];
  const c = ['#ff6bb5','#ffe135','#00d4ff','#c84bff','#fff'][Math.floor(Math.random()*5)];
  sp.style.cssText = `position:fixed;pointer-events:none;z-index:9997;
    left:${x}px;top:${y}px;font-size:${10+Math.random()*12}px;color:${c};
    transform:translate(-50%,-50%);animation:sparkleFade .7s ease forwards;`;
  document.body.appendChild(sp);
  setTimeout(() => sp.remove(), 700);
}

/* ══════ COSMIC BACKGROUND ══════ */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
function resizeBg() { bgC.width = innerWidth; bgC.height = innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

// Deep space gradient base
function drawBase() {
  const g = bgX.createRadialGradient(
    innerWidth*.35, innerHeight*.25, 0,
    innerWidth*.5, innerHeight*.5, innerWidth*.9
  );
  g.addColorStop(0,   '#04082a');
  g.addColorStop(0.4, '#02051a');
  g.addColorStop(1,   '#00000f');
  bgX.fillStyle = g;
  bgX.fillRect(0, 0, bgC.width, bgC.height);
}

// Stars — sparse, realistic
const STARS = Array.from({length: 180}, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight,
  r: Math.random() < .85 ? Math.random()*.8+.2 : Math.random()*1.4+.8,
  a: Math.random()*.7+.2,
  ao: Math.random(), aspd: Math.random()*.005+.002,
  adir: Math.random()>.5?1:-1,
  // parallax layer
  layer: Math.floor(Math.random()*3),
}));

// A few bright star clusters
const BRIGHT = Array.from({length: 12}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight*.7,
  r: 1.5+Math.random()*.8, a:.9, glow:8+Math.random()*12,
}));

let mx=0, my=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
const parallaxSpeeds = [0, 6, 14]; // pixels offset per axis

function drawCosmos() {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  drawBase();

  // Subtle nebula wisps — very dark
  [[innerWidth*.2,innerHeight*.3,'#0a1a3a',160,.06],
   [innerWidth*.75,innerHeight*.6,'#080d2e',200,.05],
   [innerWidth*.5,innerHeight*.1,'#0d1535',120,.04],
  ].forEach(([cx,cy,col,r,o]) => {
    const g = bgX.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0, col.replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g,b)=>
      `${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${o})`));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    bgX.fillStyle = g;
    bgX.beginPath(); bgX.arc(cx,cy,r,0,Math.PI*2); bgX.fill();
  });

  const px = (mx/innerWidth-.5)*2;
  const py = (my/innerHeight-.5)*2;

  // Stars
  STARS.forEach(s => {
    s.ao += s.aspd * s.adir;
    if (s.ao>1||s.ao<.05) s.adir*=-1;
    const spd = parallaxSpeeds[s.layer];
    const sx = s.x + px*spd;
    const sy = s.y + py*spd;
    bgX.beginPath();
    bgX.arc(sx, sy, s.r, 0, Math.PI*2);
    bgX.fillStyle = `rgba(255,255,255,${(s.ao*s.a).toFixed(2)})`;
    bgX.fill();
  });

  // Bright stars with glow
  BRIGHT.forEach(s => {
    const grd = bgX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.glow);
    grd.addColorStop(0,`rgba(200,220,255,${s.a})`);
    grd.addColorStop(.3,`rgba(180,200,255,.15)`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle = grd;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.glow,0,Math.PI*2); bgX.fill();
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${s.a})`; bgX.fill();
  });

  requestAnimationFrame(drawCosmos);
}
drawCosmos();

/* ══════ FIREWORKS ══════ */
const fwC = document.getElementById('fwCanvas');
const fwX = fwC.getContext('2d');
function resizeFW(){ fwC.width=innerWidth; fwC.height=innerHeight; }
resizeFW(); window.addEventListener('resize',resizeFW);

const FW_COLORS=['#ff6bb5','#ffe135','#00d4ff','#c84bff','#3dffb0','#ffffff','#ff8c42'];
let fwP=[], fwR=[], fwActive=false;

function FWRocket(x){ 
  this.x=x||Math.random()*fwC.width*.7+fwC.width*.15;
  this.y=fwC.height; this.vy=-(9+Math.random()*5);
  this.targetY=fwC.height*.08+Math.random()*fwC.height*.4;
  this.color=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  this.trail=[];
}
FWRocket.prototype.update=function(){
  this.trail.push({x:this.x,y:this.y});
  if(this.trail.length>10) this.trail.shift();
  this.y+=this.vy; this.vy*=.98;
  if(this.y<=this.targetY){ fwBurst(this.x,this.y,this.color); return true; }
  return false;
};
FWRocket.prototype.draw=function(){
  this.trail.forEach((p,i)=>{
    fwX.beginPath(); fwX.arc(p.x,p.y,1.5*(i/this.trail.length),0,Math.PI*2);
    fwX.fillStyle=this.color; fwX.globalAlpha=(i/this.trail.length)*.7;
    fwX.fill(); fwX.globalAlpha=1;
  });
};

function FWParticle(x,y,color){
  const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*5;
  this.x=x;this.y=y;this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd;
  this.alpha=1;this.color=color;this.r=1.2+Math.random()*2;
}
FWParticle.prototype.update=function(){
  this.x+=this.vx;this.y+=this.vy;
  this.vy+=.055;this.vx*=.985;this.alpha-=.015;
};
FWParticle.prototype.draw=function(){
  fwX.save();fwX.globalAlpha=Math.max(0,this.alpha);
  fwX.fillStyle=this.color;
  fwX.beginPath();fwX.arc(this.x,this.y,this.r,0,Math.PI*2);
  fwX.fill();fwX.restore();
};

function fwBurst(x,y,color){
  for(let i=0;i<70;i++) fwP.push(new FWParticle(x,y,color));
  for(let i=0;i<10;i++){ const p=new FWParticle(x,y,'#ffffff');p.r=.8;fwP.push(p);}
}

function fwLoop(){
  fwX.clearRect(0,0,fwC.width,fwC.height);
  fwR=fwR.filter(r=>!r.update());
  fwR.forEach(r=>r.draw());
  fwP=fwP.filter(p=>p.alpha>0);
  fwP.forEach(p=>{p.update();p.draw();});
  if(fwActive||fwR.length||fwP.length) requestAnimationFrame(fwLoop);
}

function launchFireworks(dur=5000){
  fwActive=true; fwLoop();
  const end=Date.now()+dur;
  const iv=setInterval(()=>{
    fwR.push(new FWRocket());
    if(Date.now()>end){clearInterval(iv);fwActive=false;}
  },500);
}

/* ══════ CLOCK + COUNTDOWN ══════ */
function updateClock(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('clockDisplay').textContent=
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const next=new Date(now.getFullYear()+(now.getMonth()>3||(now.getMonth()===3&&now.getDate()>7)?1:0),3,7);
  const diff=next-now;
  if(diff<=0){ document.getElementById('countdown').textContent='🎂 Bu gün!'; return; }
  const d=Math.floor(diff/864e5), h=Math.floor((diff%864e5)/36e5), m=Math.floor((diff%36e5)/6e4);
  document.getElementById('countdown').textContent=`${d}g ${h}s ${m}d`;
}
setInterval(updateClock,1000); updateClock();

const card=document.getElementById('mainCard');
card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
  const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
  card.style.transform=`perspective(900px) rotateY(${dx*7}deg) rotateX(${-dy*7}deg) scale(1.01)`;
});
card.addEventListener('mouseleave',()=>{ card.style.transform=''; });
