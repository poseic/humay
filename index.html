<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Diva! ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --pink:#ff6bb5; --yellow:#ffe135; --cyan:#00d4ff;
  --purple:#c84bff; --bg:#000008;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg); color:#fff; font-family:'Nunito',sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  overflow:hidden; touch-action: manipulation;
}

/* ── COSMIC BG ── */
canvas#starCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
.nebula {
  position:fixed; width:500px; height:500px; border-radius:50%;
  filter:blur(100px); opacity:0.15; pointer-events:none; z-index:0;
  background: radial-gradient(circle, var(--purple), transparent);
  animation: drift 15s infinite alternate;
}
@keyframes drift { from{transform:translate(-10%, -10%);} to{transform:translate(10%, 10%);} }

/* ── DIVA CARD ── */
.card{
  position:relative; z-index:10; background:rgba(10, 10, 25, 0.7);
  backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
  border-radius:35px; padding:40px 25px; text-align:center;
  width:90%; max-width:400px; border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 25px 50px rgba(0,0,0,0.6);
  animation: fadeIn 1.2s ease-out;
}
@keyframes fadeIn { from{opacity:0; transform:scale(0.9);} to{opacity:1; transform:scale(1);} }

/* Animated Border */
.card::after {
  content:''; position:absolute; inset:-2px; z-index:-1;
  background: linear-gradient(var(--angle, 0deg), var(--pink), var(--cyan), var(--purple), var(--pink));
  border-radius:37px; animation: rotate 4s linear infinite;
}
@property --angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
@keyframes rotate { to { --angle: 360deg; } }

h1 {
  font-family:'Pacifico', cursive; font-size: 50px; margin-bottom: 5px;
  background: linear-gradient(to right, #fff, var(--pink), var(--purple));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 10px rgba(255,107,181,0.5));
}

.sub-title { color: var(--cyan); font-weight: 800; font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; }

.message-box {
  background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;
  margin-bottom: 20px; text-align: left; border-left: 3px solid var(--pink);
  font-size: 16px; line-height: 1.6; min-height: 80px;
}

/* ── BUTTONS ── */
.btn-main {
  width: 100%; padding: 16px; background: linear-gradient(135deg, var(--pink), var(--purple));
  border: none; border-radius: 50px; color: white; font-weight: 900;
  font-size: 18px; cursor: pointer; margin-top: 10px;
  box-shadow: 0 10px 20px rgba(200, 75, 255, 0.3);
}
.btn-compliment {
  background: transparent; border: 1px solid var(--yellow); color: var(--yellow);
  padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 800;
  margin-bottom: 15px; cursor: pointer; transition: 0.3s;
}
.btn-compliment:active { background: rgba(255, 225, 53, 0.1); }

.compliment-display { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 8px; min-height: 20px; font-style: italic; }

/* Meteor */
.meteor {
  position: fixed; background: linear-gradient(90deg, #fff, transparent);
  height: 2px; pointer-events: none; z-index: 1;
  animation: meteor 1.5s linear forwards;
}
@keyframes meteor {
  0% { transform: translateX(-100px) translateY(0) rotate(25deg); opacity: 1; }
  100% { transform: translateX(120vw) translateY(400px) rotate(25deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="nebula"></div>
<canvas id="starCanvas"></canvas>

<div class="card">
    <div style="font-size: 45px;">👑</div>
    <h1>Humay</h1>
    <p class="sub-title">AD GÜNÜN MÜBARƏK, DIVA!</p>
    
    <div class="message-box">
        <span id="typed"></span>
    </div>

    <div class="compliment-area">
        <p class="compliment-display" id="compText">Bura kliklə və günün parlasın... ✨</p>
        <button class="btn-compliment" id="compBtn">Günün Komplimenti 💖</button>
    </div>

    <button class="btn-main" id="magicBtn">Sürprizi Başlat! 🎆</button>
</div>

<script>
// Typewriter
const msg = "Yeni yaşın sənə bol şans, uğur və sənin kimi parlaq bir gələcək gətirsin! Bu il bütün səhnələr sənindir. Yaxşı ki varsan! 💎✨";
let idx = 0;
function type() {
    if(idx < msg.length) {
        document.getElementById('typed').innerHTML += msg.charAt(idx);
        idx++; setTimeout(type, 45);
    }
}
window.onload = type;

// Compliment Sistemi
const compliments = [
    "Sən bu kainatın ən parlaq ulduzusan! ⭐",
    "Bu gün bütün diqqətlər sənin üzərində olmalıdır, Diva! 👑",
    "Gülüşün ətrafı işıqlandırır, heç vaxt sönmə! ✨",
    "Səndən bir dənədir, dəyərini bil! 💎",
    "Yeni yaşında bütün arzuların reallığa çevrilsin! 🌈",
    "Diva olmaq sənin ruhunda var! 💅"
];

document.getElementById('compBtn').addEventListener('click', () => {
    const text = document.getElementById('compText');
    text.style.opacity = 0;
    setTimeout(() => {
        text.innerText = compliments[Math.floor(Math.random() * compliments.length)];
        text.style.opacity = 1;
    }, 200);
});

// Celebration
document.getElementById('magicBtn').addEventListener('click', () => {
    const duration = 4 * 1000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ['#ff6bb5', '#c84bff'] });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ['#00d4ff', '#ffe135'] });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
});

// Star Background
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let stars = Array.from({length: 100}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5,
    speed: Math.random() * 0.2 + 0.05
}));

function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
    });
    requestAnimationFrame(animate);
}
animate();

// Meteor Generator
setInterval(() => {
    const m = document.createElement('div');
    m.className = 'meteor';
    m.style.top = Math.random() * 40 + '%';
    m.style.left = '-100px';
    m.style.width = Math.random() * 100 + 100 + 'px';
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 1500);
}, 3500);
</script>
</body>
</html>
