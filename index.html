<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Humay ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --pink:#ff6bb5; --yellow:#ffe135; --cyan:#00d4ff;
  --purple:#c84bff; --bg:#020210;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg); color:#fff; font-family:'Nunito',sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  overflow:hidden; touch-action: manipulation;
}

/* ── FON CANVASI ── */
canvas#starCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── KART (Mobilə uyğun ölçü) ── */
.card{
  position:relative; z-index:10; background:rgba(255,255,255,.07);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:30px; padding:30px 20px; text-align:center;
  width:90%; max-width:380px; border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  animation: cardFadeIn 1s ease;
}
@keyframes cardFadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

/* Animasiyalı Border */
.card::after {
  content:''; position:absolute; inset:-2px; z-index:-1;
  background: linear-gradient(var(--angle, 0deg), var(--pink), var(--cyan), var(--purple), var(--pink));
  border-radius:32px; animation: rotate 4s linear infinite;
}
@property --angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
@keyframes rotate { to { --angle: 360deg; } }

h1 {
  font-family:'Pacifico', cursive; font-size: 45px; margin-bottom: 10px;
  background: linear-gradient(to right, var(--pink), var(--yellow), var(--cyan));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.message-box {
  background: rgba(255,255,255,0.05); padding: 15px;
  border-radius: 15px; margin: 20px 0; min-height: 60px;
  font-size: 16px; line-height: 1.5; text-align: left;
  border-left: 4px solid var(--pink);
}

/* DÜYMƏLƏR (Böyük və Kliklənən) */
.btn-main {
  width: 100%; padding: 16px; background: linear-gradient(135deg, var(--pink), var(--purple));
  border: none; border-radius: 50px; color: white; font-weight: 900;
  font-size: 18px; cursor: pointer; margin-top: 10px;
  box-shadow: 0 5px 15px rgba(255, 107, 181, 0.4);
}
.btn-main:active { transform: scale(0.96); }

/* Məsafədən gələn ulduzlar animasiyası */
.meteor {
  position: fixed; background: linear-gradient(90deg, #fff, transparent);
  height: 1px; pointer-events: none; z-index: 1;
  animation: meteorFly 2s linear forwards;
}
@keyframes meteorFly {
  0% { transform: translateX(-100px) translateY(0) rotate(20deg); opacity: 1; }
  100% { transform: translateX(calc(100vw + 100px)) translateY(300px) rotate(20deg); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="card" id="card">
    <div style="font-size: 40px; margin-bottom: 10px;">🎂</div>
    <h1>Humay</h1>
    <p style="color: var(--cyan); font-weight: 800; letter-spacing: 1px;">AD GÜNÜN MÜBARƏK!</p>
    
    <div class="message-box">
        <span id="typed"></span>
    </div>

    <button class="btn-main" id="celebrateBtn">Sürprizi Aç! 🎆</button>
</div>

<script>
// Mobile Klik Problemini Həll Etmək üçün Listener
document.getElementById('celebrateBtn').addEventListener('click', function() {
    celebrate();
});

// Typewriter (Daha sürətli)
const msg = "Yeni yaşın sənə bol şans, sonsuz sevinc və uğur gətirsin! Hər arzun çin olsun. Yaxşı ki varsan! ✨";
let index = 0;
function type() {
    if(index < msg.length) {
        document.getElementById('typed').innerHTML += msg.charAt(index);
        index++; setTimeout(type, 40);
    }
}
window.onload = type;

// Atəşfəşanlıq (Mobil üçün optimallaşdırılmış)
function celebrate() {
    const end = Date.now() + (3 * 1000);
    const colors = ['#ff6bb5', '#ffe135', '#00d4ff', '#c84bff'];

    (function frame() {
        confetti({
            particleCount: 3,
            angle: 60,
            spread: 55,
            origin: { x: 0, y: 0.7 },
            colors: colors
        });
        confetti({
            particleCount: 3,
            angle: 120,
            spread: 55,
            origin: { x: 1, y: 0.7 },
            colors: colors
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    }());
}

// Arxa fon ulduzları
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.2,
    speed: Math.random() * 0.3 + 0.1
}));

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
        s.y -= s.speed;
        if(s.y < 0) s.y = canvas.height;
    });
    requestAnimationFrame(draw);
}
draw();

// Meteor animasiyası (hər 4 saniyədən bir)
setInterval(() => {
    const m = document.createElement('div');
    m.className = 'meteor';
    m.style.top = Math.random() * 40 + '%';
    m.style.left = '-50px';
    m.style.width = Math.random() * 80 + 40 + 'px';
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 2000);
}, 4000);
</script>
</body>
</html>
