<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Humay - Slay Queen ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
  --gold: #d4af37;
  --gold-glow: rgba(212, 175, 55, 0.6);
  --bg-dark: #020205;
  --white: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg-dark);
  color: var(--white);
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── COSMIC BG ── */
#starCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.nebula {
  position: fixed; width: 150vw; height: 150vh; border-radius: 50%;
  background: radial-gradient(circle, #310062 0%, transparent 70%);
  filter: blur(120px); opacity: 0.15; z-index: 0;
}

/* ── LUXURY CARD ── */
.card {
  position: relative; z-index: 10;
  width: 92%; max-width: 450px;
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-radius: 40px; padding: 45px 25px; text-align: center;
  border: 1px solid rgba(212, 175, 55, 0.2);
  box-shadow: 0 40px 100px rgba(0,0,0,0.9);
  transition: transform 0.3s ease;
}

.card::before {
  content: ''; position: absolute; inset: -2px; z-index: -1;
  background: linear-gradient(135deg, transparent, var(--gold), transparent, var(--gold), transparent);
  background-size: 400% 400%; border-radius: 42px; opacity: 0.3;
  animation: auraFlow 6s linear infinite;
}
@keyframes auraFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

h1 { font-family: 'Playfair Display', serif; font-size: 60px; font-weight: 900; background: linear-gradient(135deg, #fcf6ba 0%, #d4af37 100%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
.diva-badge { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: var(--gold); display: block; margin-bottom: 30px; }

/* ── THE LEGENDARY EXPLOSION OVERLAY ── */
.legendary-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle, rgba(20,0,40,0.95) 0%, #000 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
}

.legendary-overlay.active { opacity: 1; pointer-events: auto; }

.slay-text {
    font-family: 'Playfair Display', serif;
    font-size: 38px; font-weight: 900; color: var(--gold);
    text-align: center; line-height: 1.3; padding: 30px;
    transform: scale(0.2) rotate(-10deg); filter: blur(20px);
    transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
    text-shadow: 0 0 30px var(--gold), 0 0 60px rgba(212,175,55,0.4);
}

.legendary-overlay.active .slay-text {
    transform: scale(1.1) rotate(0deg); filter: blur(0);
}

/* Flash Effect */
.flash {
    position: fixed; inset: 0; background: #fff; z-index: 10000;
    opacity: 0; pointer-events: none;
}

/* ── UI ELEMENTS ── */
#typed-text { font-size: 16px; font-style: italic; color: rgba(255,255,255,0.8); min-height: 80px; display: block; margin-bottom: 30px;}
.btn-luxury { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 50px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; width: 100%;}
.btn-main { width: 100%; padding: 22px; border: none; border-radius: 100px; background: var(--white); color: #000; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 15px 40px rgba(212,175,55,0.2); }

/* Shake Animation */
@keyframes shakeBody {
    0% { transform: translate(0,0) }
    10% { transform: translate(-10px,-10px) }
    30% { transform: translate(10px,10px) }
    50% { transform: translate(-10px,10px) }
    70% { transform: translate(10px,-10px) }
    100% { transform: translate(0,0) }
}

.shake-active { animation: shakeBody 0.4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="flash" id="flashScreen"></div>
<div class="nebula"></div>
<canvas id="starCanvas"></canvas>

<div class="legendary-overlay" id="overlay">
    <div class="slay-text">
        Lambo olmadı üzrlü say.<br>
        <span style="font-size: 60px; color: #fff;">Slay Queen</span> 💅✨
    </div>
</div>

<div class="card" id="mainCard">
    <span style="font-size: 50px;">👑</span>
    <h1>Humay</h1>
    <span class="diva-badge">The Eternal Diva</span>

    <div class="message-container">
        <span id="typed-text"></span>
    </div>

    <button class="btn-luxury" id="compBtn">Günün Komplimenti ✨</button>
    <button class="btn-main" id="magicBtn">Buraya Click 🎆</button>
</div>

<script>
// --- TYPEWRITER ---
const messages = ["Gözəlliyin inflyasiyadan daha sürətli artır, dayandıra bilmirik diva! 📈✨",
"Bu gün stilinlə rəsmən atmosferi yandırdın(slay), itfaiyə çağırmışıq. 🔥💅",
"Sən bir ikonasan, digərləri sadəcə arxa fon rəqqaslarıdır. 💃👑",
"Kainatda milyardlarla ulduz var, amma heç biri sənin qədər 'main character' deyil. ⭐",
"Zərifliyin elə bir səviyyədədir ki, sanki hər addımın qırmızı xalçadır. 👠✨",
"Sənin enerjin 24 karat qızıldan daha parlaq və daha dəyərlidir diva! 💎",
"Dizaynerlər hələ sənin qədər qüsursuz bir şey yaratmağı bacarmayıblar. 🏛️✨",
"Baxışlarınla rəsmən sənət əsəri kimi görünürsən, muzeyə qoyulmalısan queen. 🎨",
"Dünya bir səhnədirsə, sən hər zaman ən çox alqışlanan aktrisasan. 🎭👏];
let mIdx = 0, cIdx = 0, isDel = false;
function type() {
    const curr = messages[mIdx];
    document.getElementById('typed-text').textContent = isDel ? curr.substring(0, cIdx-1) : curr.substring(0, cIdx+1);
    cIdx = isDel ? cIdx-1 : cIdx+1;
    if(!isDel && cIdx === curr.length) { setTimeout(()=>isDel=true, 3000); }
    else if(isDel && cIdx === 0) { isDel=false; mIdx = (mIdx+1)%messages.length; }
    setTimeout(type, isDel ? 50 : 100);
}
type();

// --- THE LEGENDARY EXPLOSION LOGIC ---
document.getElementById('magicBtn').addEventListener('click', () => {
    const flash = document.getElementById('flashScreen');
    const overlay = document.getElementById('overlay');
    const body = document.body;

    // 1. Flash Effect
    flash.style.opacity = '1';
    
    // 2. Start Shake
    body.classList.add('shake-active');

    setTimeout(() => {
        flash.style.opacity = '0';
        overlay.classList.add('active');
        
        // 3. Fire Confetti (Gold only)
        confetti({
            particleCount: 200,
            spread: 90,
            origin: { y: 0.6 },
            colors: ['#d4af37', '#ffffff', '#fcf6ba']
        });
    }, 150);

    // Stop shake after a bit
    setTimeout(() => { body.classList.remove('shake-active'); }, 600);

    // Close after 5 seconds
    setTimeout(() => { overlay.classList.remove('active'); }, 5000);
});

// --- STAR BACKGROUND ---
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
let stars = Array.from({length: 100}, () => ({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5, o: Math.random(), s: Math.random()*0.02 }));
function draw() {
    ctx.clearRect(0,0,w,h);
    stars.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${s.o})`; ctx.fill();
        s.o += s.s; if(s.o>1 || s.o<0) s.s = -s.s;
    });
    requestAnimationFrame(draw);
}
draw();

// Kompliment
document.getElementById('compBtn').addEventListener('click', () => {
    alert("Sən bir ikonasan! 💅");
});
</script>
</body>
</html>
